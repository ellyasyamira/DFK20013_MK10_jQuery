<!DOCTYPE html>
<html>
<head>
    <title>Projek jQuery Mobile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link rel="stylesheet" href="css/themes/custom-theme.css" />
    <link rel="stylesheet" href="css/themes/jquery.mobile.icons.min.css" />
    
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile.structure-1.4.5.min.css" />
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>
</head>
<body>

    <div data-role="page" id="loginPage" data-theme="a">
        <div data-role="header">
            <h1>Selamat Datang</h1>
        </div>

        <div role="main" class="ui-content">
            <form id="loginForm">
                <label for="username">Username:</label>
                <input type="text" name="username" id="username" value="" data-clear-btn="true">
                
                <label for="password">Password:</label>
                <input type="password" name="password" id="password" value="" data-clear-btn="true">
                
                <button type="button" id="btnLogin" class="ui-btn ui-corner-all ui-shadow ui-btn-b">Masuk</button>
            </form>

            <div data-role="popup" id="popupValidation" data-overlay-theme="b" data-theme="a" class="ui-corner-all">
                <div data-role="header" data-theme="a">
                    <h1>Amaran</h1>
                </div>
                <div role="main" class="ui-content" style="text-align:center;">
                    <p>Sila isi username & password!</p>
                    <a href="#" data-rel="back" class="ui-btn ui-corner-all ui-shadow ui-btn-inline ui-btn-a">Tutup</a>
                </div>
            </div>
        </div>
    </div>

    <div data-role="page" id="infoPage" data-theme="b">
        <div data-role="header">
            <a href="#loginPage" class="ui-btn ui-icon-back ui-btn-icon-left">Logout</a>
            <h1>Dashboard</h1>
        </div>

        <div role="main" class="ui-content">
            <h2>Tahniah!</h2>
            <p>Anda telah berjaya log masuk ke dalam sistem.</p>
            <ul data-role="listview" data-inset="true">
                <li><a href="#">Profil Pengguna</a></li>
                <li><a href="#">Tetapan Akaun</a></li>
                <li><a href="#">Bantuan</a></li>
            </ul>
        </div>

        <div data-role="footer" data-position="fixed">
            <h4>Sistem Lab 2026</h4>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
